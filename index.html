    </style>
</head>
<body>
    <h1>Welcome to Al Furqan Quiz</h1>
    <button class="quit-btn wrong-bg">Quit</button>
    <script>
        // Name Mask Implementation
        function nameMask(input) {
            input = input.replace(/[\u0600-\u06FF]/g, ''); // ignore harakats
            return input;
        }
        // Restore proximity percentage display
        function updateProximityDisplay(percentage) {
            if (percentage < 30) return 'loin';
            else if (percentage < 70) return 'presque';
            else return 'très proche';
        }
    </script>
</body>
